<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="muds_hackathon_vol3">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>muds_hackathon_vol3</title>
  <link rel="manifest" href="manifest.json">
  <style>
    #permission-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #FDF7EE;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }
    #permission-btn {
      padding: 16px 40px;
      font-size: 18px;
      font-weight: bold;
      background-color: #FA718F;
      color: white;
      border: none;
      border-radius: 30px;
      box-shadow: 0 4px 12px rgba(250, 113, 143, 0.4);
      cursor: pointer;
    }
  </style>
  <script>
    // iOSかどうかを判定する簡易関数
    function isIOSDevice() {
      return (
        [
          'iPad Simulator',
          'iPhone Simulator',
          'iPod Simulator',
          'iPad',
          'iPhone',
          'iPod'
        ].includes(navigator.platform)
        // iPad on iOS 13 detection
        || (navigator.userAgent.includes("Mac") && "ontouchend" in document)
      );
    }

    document.addEventListener("DOMContentLoaded", function() {
      // もしiOSかつ、許可リクエストの機能がある場合のみオーバーレイを作成する
      if (isIOSDevice() && typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
        const overlay = document.createElement('div');
        overlay.id = 'permission-overlay';
        
        const title = document.createElement('h2');
        title.style.color = '#4A4A4A';
        title.style.marginBottom = '24px';
        title.innerText = 'タップしてアプリを開始';
        
        const btn = document.createElement('button');
        btn.id = 'permission-btn';
        btn.innerText = 'スタート！';
        
        overlay.appendChild(title);
        overlay.appendChild(btn);
        document.body.appendChild(overlay);

        btn.addEventListener('click', () => {
          DeviceMotionEvent.requestPermission()
            .then(permissionState => {
              console.log('Permission state:', permissionState);
              overlay.remove();
            })
            .catch(console.error);
        });
      }
    });
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
